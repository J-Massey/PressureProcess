name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-smoke:
    name: Python Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.10.0+cpu
          python -m pip install .

      - name: Verify dependency resolution
        run: python -m pip check

      - name: Compile sources
        run: python -m compileall src

      - name: Smoke import
        run: |
          python -c "from src.config_params import Config; print(Config().ROOT_DIR)"
          python -c "import src.run_pipeline"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t pressureprocess:ci .
